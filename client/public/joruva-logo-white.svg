<?xml version="1.0" encoding="UTF-8"?>
<!-- Sentinel mark — white variant for dark backgrounds -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="stFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#0F0D29"/>
      <stop offset="100%" stop-color="#06050F"/>
    </linearGradient>
    <linearGradient id="stEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312E81"/><stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="stTop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312E81"/><stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="stSlit" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="50%" stop-color="#D97706"/><stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="stGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="stSlitGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <ellipse cx="100" cy="152" rx="70" ry="12" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.12"/>
  <ellipse cx="100" cy="152" rx="56" ry="9" fill="none" stroke="#F59E0B" stroke-width="1.8" opacity="0.2"/>
  <ellipse cx="100" cy="152" rx="42" ry="6" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.35"/>
  <polygon points="78,32 122,32 122,152 78,152" fill="url(#stFace)"/>
  <polygon points="122,32 134,26 134,146 122,152" fill="url(#stEdge)"/>
  <polygon points="78,32 90,26 134,26 122,32" fill="url(#stTop)"/>
  <rect x="86" y="86" width="28" height="3" rx="1.5" fill="url(#stSlit)" filter="url(#stSlitGlow)"/>
  <rect x="86" y="86" width="28" height="3" rx="1.5" fill="#F59E0B" opacity="0.3" filter="url(#stGlow)"/>
</svg>

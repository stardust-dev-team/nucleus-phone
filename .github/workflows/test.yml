name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on force-push (PR head) or rapid pushes to main.
# Each refname gets its own concurrency group so a main push doesn't
# cancel an in-flight PR check and vice versa. nucleus-phone-3n33.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Jest suite (incl. team-registry conformance + drift sentinels)
        # Drift sentinels in server/lib/__tests__/team-registry.conformance.test.js
        # pin +16026000188 -> Ryann and +16234620197 -> Tom (iosIdentity).
        # Any future re-point in team.json without updating the sentinel
        # fails CI loudly rather than silently diverging from runbooks.
        #
        # --ci hardens behavior vs. local: treats unhandled promise rejections
        # as failures, disables interactive watch/snapshot prompts, and emits
        # JUnit-compatible output. nucleus-phone-3n33.
        run: npm test -- --ci

      - name: Run cross-cutting contract tests (top-level __tests__/)
        # Top-level __tests__/ holds integration tests that cross the
        # client/server boundary. Currently the only resident is
        # tristar-mode-no-local-writes (bead nucleus-phone-bboo) — the
        # load-bearing alarm for the "no local writes when TARGETS.TRISTAR
        # resolves" contract. Layer 4 of that test walks server/ and asserts
        # the nucleus_phone_calls write-site map is exactly the documented
        # set; a new write site appearing outside the set fails CI here.
        #
        # Targeted via testPathPatterns rather than running the full client
        # config because client/src has pre-existing React-version test
        # failures tracked separately. Widen to the full client config when
        # those clear.
        run: npm run test:client -- --ci --testPathPatterns="__tests__/tristar-mode-no-local-writes"

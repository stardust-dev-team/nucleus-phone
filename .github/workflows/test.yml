name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on force-push (PR head) or rapid pushes to main.
# Each refname gets its own concurrency group so a main push doesn't
# cancel an in-flight PR check and vice versa. nucleus-phone-3n33.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Jest suite (incl. inbound-routes conformance + drift sentinel)
        # Drift sentinel in server/routes/__tests__/incoming.conformance.test.js
        # pins +16026000188 -> Ryann. Any future re-point will fail CI loudly
        # rather than silently diverging from runbooks like it did in May 2026.
        #
        # --ci hardens behavior vs. local: treats unhandled promise rejections
        # as failures, disables interactive watch/snapshot prompts, and emits
        # JUnit-compatible output. nucleus-phone-3n33.
        run: npm test -- --ci

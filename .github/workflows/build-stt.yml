name: build-stt

# Verifies the nucleus-stt Docker image actually builds (bead nucleus-phone-rgja.6,
# Stage B3). The image bakes the moonshine/base ONNX model and builds a uv-managed
# Python 3.13 venv (pywhispercpp may compile whisper.cpp from source) — none of which
# was validated in the authoring session because Docker was unavailable there.
#
# Why CI instead of a one-off local `docker build`: Render builds linux/amd64, and the
# Dockerfile's risky deps (pywhispercpp wheels / moonshine_onnx) are arch-specific. A
# local arm64 build (the only thing the dev Mac can do) would verify the WRONG target.
# ubuntu-latest runners are amd64 — they build exactly what Render builds, on every push
# that touches the image. This does NOT create or deploy the (paid, gated) Render service;
# it only proves the image builds. See nucleus-stt/DEPLOY.md.

on:
  push:
    paths:
      - 'nucleus-stt/**'
      - '.github/workflows/build-stt.yml'
  pull_request:
    branches: [main]
    paths:
      - 'nucleus-stt/**'
      - '.github/workflows/build-stt.yml'
  workflow_dispatch:

# Mirror test.yml: per-ref group so a main push doesn't cancel an in-flight PR check.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build nucleus-stt image (no push)
        # Context = nucleus-stt/ to match Render's rootDir: nucleus-stt, so the
        # Dockerfile's relative COPY paths resolve identically to production. This is
        # the exact command DEPLOY.md prescribes; BuildKit is on by default on the
        # runner (honors the `# syntax=` directive + heredoc RUN). Build only — never
        # push: this job validates the image, it does not ship it.
        run: DOCKER_BUILDKIT=1 docker build -t nucleus-stt:ci nucleus-stt/
